<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLAIRE BAYLON 6OTH BIRTHDAY DINNER PARTY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f7f3e9;
        color: #4b4b4b;
      }
      .hero {
        background-image: url("https://placehold.co/1200x800/e0e0e0/ffffff?text=Lola+Mely");
        background-size: cover;
        background-position: center;
      }
      .heading-font {
        font-family: "Cormorant Garamond", serif;
      }
      .shadow-text {
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-lg w-full transform transition-transform duration-500 hover:scale-105"
    >
      <!-- Hero Section -->
      <div
        class="hero h-96 flex items-center justify-center p-6 text-center text-white"
      >
        <div class="p-6 bg-black bg-opacity-30 rounded-2xl backdrop-blur-sm">
          <p class="text-xl sm:text-2xl font-bold mb-2 shadow-text">
            You're Invited in Dinner Party!
          </p>
          <h1
            class="heading-font text-5xl sm:text-6xl font-bold leading-tight shadow-text"
          >
            CLAIRE BAYLON <br />6OTH BIRTHDAY
          </h1>
        </div>
      </div>

      <!-- Details Section -->
      <div class="p-8 sm:p-12 text-center">
        <p class="text-lg sm:text-xl font-medium mb-2">
          Join us in celebrating this special milestone.
        </p>
        <p
          class="text-3xl sm:text-4xl heading-font font-bold mb-6 text-[#9a6a51]"
        >
          July 21, 2026 | Tuesday
        </p>

        <div
          class="flex flex-col sm:flex-row items-center justify-center gap-6 sm:gap-12 mb-8"
        >
          <div class="flex items-center space-x-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8 text-[#9a6a51]"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
              />
            </svg>
            <p class="text-base sm:text-lg font-bold">
              Salo Cafe & Restaurant<br /><span class="font-normal text-sm"
                >E Rodriguez Ave, Taytay, 1920 Rizal</span
              >
            </p>
          </div>
          <div class="flex items-center space-x-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8 text-[#9a6a51]"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm.5 13h-2v-6h2V15zm0-8h-2V7h2V9z"
              />
            </svg>
            <p class="text-base sm:text-lg font-bold">3:30 PM - 7:30 PM</p>
          </div>
        </div>

        <a
          href="https://maps.app.goo.gl/5AvZPQauh9hkHr5T8"
          target="_blank"
          class="inline-block bg-[#9a6a51] text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 hover:bg-[#7c5542] hover:shadow-xl"
          >View on Map</a
        >
      </div>
    </div>
  </body>
</html>
